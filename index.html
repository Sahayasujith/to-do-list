<!DOCTYPE html>
<html>
<head>
    <title>Task Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Task Manager</h2>
        <ul>
            <li>Dashboard</li>
            <li>Tasks</li>
            <li>Reports</li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main">

        <div class="header">
            <h2>Dashboard</h2>

            <div class="top-buttons">
                <button onclick="toggleSidebar()">☰ Menu</button>
                <button onclick="toggleDarkMode()">Dark Mode</button>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="cards">
            <div class="card">
                <h3>Total Tasks</h3>
                <p id="total">0</p>
            </div>

            <div class="card">
                <h3>Pending</h3>
                <p id="pending">0</p>
            </div>

            <div class="card">
                <h3>Completed</h3>
                <p id="completed">0</p>
            </div>
        </div>

        <!-- Task Form -->
        <div class="form">
            <input type="text" id="name" placeholder="Task Name">
            <input type="text" id="desc" placeholder="Description">

            <select id="priority">
                <option>High</option>
                <option>Medium</option>
                <option>Low</option>
            </select>

            <input type="date" id="date">

            <button onclick="addTask()">Add Task</button>
        </div>

        <input type="text" id="search" placeholder="Search..." onkeyup="searchTask()">

        <!-- Task Table -->
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Priority</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="taskTable"></tbody>
        </table>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
